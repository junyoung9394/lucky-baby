name: Update RSS lastBuildDate

on:
  schedule:
    - cron: '0 15 * * *'  # 매일 자정 KST (UTC 15:00)
  workflow_dispatch:

jobs:
  update-rss:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update lastBuildDate
        run: |
          TODAY=$(TZ=Asia/Seoul date '+%a, %d %b %Y 00:00:00 +0900')
          sed -i "s|<lastBuildDate>.*</lastBuildDate>|<lastBuildDate>${TODAY}</lastBuildDate>|" rss.xml

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add rss.xml
          git diff --cached --quiet || git commit -m "chore: RSS lastBuildDate 자동 업데이트"
          git push
