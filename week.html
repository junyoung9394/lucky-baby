const tri1 = Array.from({length:13},(_,i)=>i+1);
const tri2 = Array.from({length:14},(_,i)=>i+14);
const tri3 = Array.from({length:13},(_,i)=>i+28);
const milestones = [4,5,8,12,16,20,24,28,36,37,40];

let currentWeeks = tri1;
let selectedWeek = 4;

function setTrimester(n, btn) {
  document.querySelectorAll('.tri-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  currentWeeks = n===1?tri1:n===2?tri2:tri3;
  selectedWeek = currentWeeks[0];
  renderGrid();
}

function renderGrid() {
  const grid = document.getElementById('week-grid');
  grid.innerHTML = currentWeeks.map(w=>`
    <button class="week-btn${milestones.includes(w)?' milestone':''}${w===selectedWeek?' active':''}" onclick="selectWeek(${w},this)">${w}주</button>
  `).join('');
  renderDetail();
}

function selectWeek(w, btn) {
  selectedWeek = w;
  document.querySelectorAll('.week-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderDetail();
}

function renderDetail() {
  const w = selectedWeek;
  // find closest week data
  const keys = Object.keys(weeks).map(Number).sort((a,b)=>a-b);
  let key = keys[0];
  for(const k of keys){ if(w>=k) key=k; }
  const d = weeks[key] || weeks[4];
  document.getElementById('week-detail').innerHTML = `
    <div class="wd-week">임신 ${w}주차</div>
    <div class="wd-title">${d.title}</div>
    <div class="wd-grid">
      <div class="wd-item"><div class="wd-item-label">태아 크기</div><div class="wd-item-val">${d.sizeIcon} ${d.size}</div></div>
      <div class="wd-item"><div class="wd-item-label">몸무게</div><div class="wd-item-val">약 ${d.weight}</div></div>
    </div>
    <div class="wd-desc">${d.desc}</div>
    <div class="wd-check">✅ <strong>이 시기 체크포인트</strong><br>${d.check}</div>
  `;
  renderWeekCoupang('m-week-cp', w);
}

renderGrid();

// URL 파라미터로 특정 주차 자동 선택 (?w=12)
const urlW = parseInt(new URLSearchParams(location.search).get('w'));
if (urlW >= 1 && urlW <= 40) {
  const btnIdx = urlW <= 13 ? 0 : urlW <= 27 ? 1 : 2;
  setTrimester(btnIdx + 1, document.querySelectorAll('.tri-btn')[btnIdx]);
  selectedWeek = urlW;
  renderGrid();
  setTimeout(() => document.querySelector('.week-detail').scrollIntoView({behavior:'smooth', block:'start'}), 300);
}
